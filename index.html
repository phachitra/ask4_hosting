<!DOCTYPE html>
<html lang="en"></html>
<html>
	<head>
		<title>Pha Chetra</title>
	</head>	
		
		<body>
            <center>
            <table border="2" style="width: 500px;">
                <tbody>
                    <tr style="background-color: rgb(0, 73, 142);">
                        <td style="width: 150px; text-align: center;">
                            <b>Name</b>

                        </td>
                        <td style="text-align: center;">
                            <b>Value</b>
                        </td>
                    </tr>
                    <tr>
                        <td>Name</td>
                        <td>
                        <label for="name"></label>
                        <input type="text" id="name" name="name" style="width: 100%;">
                        </td>
                    </tr>
                    <tr>
                        <td>Sex</td>
                        <td>
                            <input type="radio" name="sex" value="Male"> Male <br>
                            <input type="radio" name="sex" value="Female" checked> Female
                        </td>
                    </tr>
                    <tr>
                        <td>Eye color</td>
                        <td>
                            <label for="eyecolor"></label>
                            <select id="eyecolor" name="eyecolor">
                                <option value="green">Green</option>
                                <option value="blue">blue</option>
                                <option value="brown">Brown</option>
                                <option value="yellow">Yellow</option>
                            </select>
                              
                        </td>
                    </tr>
                    <tr>
                        <td>Check all that apply</td>
                        <td>
                            <input type="checkbox" id="6" name="6">
                            <label for="6">Over 6 feet tall</label>
                            <br>
                            <input type="checkbox" id="200" name="200">
                            <label for="200">Over 200 pounds</label>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            Describe your athletic ability:
                            <br>
                            <textarea id="describe" name="describe" rows="4" style="width: 100%;"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <center><input type="submit" value="Enter my imformation"></center>
                        </td>
                    </tr>
                </tbody>
            </table>
            </center>
		</body>
		

</html>
